name: CI/CD Pipeline

# Run this every time we push to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-python-backend:
    name: Level 3 - Python Pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        # We set fake API keys here just so the code doesn't crash before the mock intercepts it!
        env:
          NVIDIA_API_KEY: "fake_key_for_testing"
          TAVILY_API_KEY: "fake_key_for_testing"
          SERPER_API_KEY: "fake_key_for_testing"
        run: |
          pytest backend/test_main.py

  test-docker-build:
    name: Level 1 - Docker Build Test
    runs-on: ubuntu-latest
    needs: test-python-backend # Only build Docker if the Python tests pass first!
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Containers
        run: docker compose build